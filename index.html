<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xander EMS v2.2</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2e;
  --accent:#3b82f6;
  --danger:#ef4444;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  background:var(--panel);
}

.container{max-width:1100px;margin:auto;padding:16px;}

.panel{
  background:var(--panel);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  margin-top:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

button.danger{background:var(--danger);}

.hidden{display:none;}

.row{display:flex;gap:10px;flex-wrap:wrap;}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px 16px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<header>
  <b>Xander EMS v2.2</b>
  <button id="logoutBtn">Logout</button>
</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="panel">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="app" class="hidden">

    <div class="panel">
      <h3>Create Employee</h3>
      <input id="name" placeholder="Name"/>
      <input id="empEmail" placeholder="Email"/>
      <input id="phone" placeholder="Phone"/>
      <input id="address" placeholder="Address"/>
      <input id="salary" placeholder="Salary"/>
      <textarea id="notes" placeholder="Notes"></textarea>

      <button onclick="addEmployee()">Add</button>
    </div>

    <div class="panel">
      <input id="search" placeholder="Search..." oninput="render()"/>
    </div>

    <div class="panel">
      <h3>Employees</h3>
      <div id="employees"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_ORT_1nKU_wt7ONnspTl7yLxvA-YqN_k",
  authDomain: "group-chat-xand.firebaseapp.com",
  projectId: "group-chat-xand",
  storageBucket: "group-chat-xand.firebasestorage.app",
  messagingSenderId: "316883609389",
  appId: "1:316883609389:web:3126c72e78135ee8b5d5a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_UID = "REPLACE_WITH_YOUR_UID";

let employees = [];

const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("app");

const toast = (msg) => {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch (e) {
    toast("Login failed");
  }
};

document.getElementById("logoutBtn").onclick = () => signOut(auth);

// AUTH STATE (FIXED + CLEAN)
onAuthStateChanged(auth, (user) => {
  if (user && user.uid === ADMIN_UID) {
    loginBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    toast("Logged in");
    listen();
  } else {
    appBox.classList.add("hidden");
    loginBox.classList.remove("hidden");
  }
});

// FIRESTORE
function listen(){
  onSnapshot(query(collection(db,"employees")), snap=>{
    employees = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

window.addEmployee = async () => {
  await addDoc(collection(db,"employees"),{
    name:name.value,
    email:empEmail.value,
    phone:phone.value,
    address:address.value,
    salary:Number(salary.value),
    notes:notes.value,
    warnings:0,
    status:"active",
    createdAt:serverTimestamp()
  });

  toast("Employee added");
};

window.fire = async (id) => {
  await updateDoc(doc(db,"employees",id),{
    status:"fired"
  });
  toast("Fired");
};

window.render = () => {
  const s = search.value?.toLowerCase() || "";
  employeesDiv.innerHTML = "";

  employees
    .filter(e =>
      e.name.toLowerCase().includes(s) ||
      e.email.toLowerCase().includes(s)
    )
    .forEach(e=>{
      employeesDiv.innerHTML += `
        <div class="panel">
          <b>${e.name}</b> (${e.status})<br/>
          ${e.email}<br/>
          £${e.salary}<br/><br/>
          <button class="danger" onclick="fire('${e.id}')">Fire</button>
        </div>
      `;
    });
};
</script>

</body>
</html>
