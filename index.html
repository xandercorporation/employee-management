<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xander EMS v2.3</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2e;
  --accent:#3b82f6;
  --danger:#ef4444;
  --text:#e5e7eb;
  --warn:#f59e0b;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  background:var(--panel);
}

.container{max-width:1100px;margin:auto;padding:16px;}

.panel{
  background:var(--panel);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

button.danger{background:var(--danger);}

.hidden{display:none;}

#toast{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px 14px;
  border-radius:8px;
  display:none;
}

#errorBox{
  background:#1f2937;
  border-left:4px solid var(--danger);
  padding:10px;
  margin-bottom:10px;
  display:none;
}
</style>
</head>

<body>

<header>
  <b>Xander EMS v2.3</b>
  <button id="logoutBtn">Logout</button>
</header>

<div class="container">

  <!-- ERROR BOX -->
  <div id="errorBox"></div>

  <!-- LOGIN -->
  <div id="loginBox" class="panel">
    <h3>Admin Login</h3>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <div class="panel">
      <h3>Create Employee</h3>
      <input id="name" placeholder="Name"/>
      <input id="empEmail" placeholder="Email"/>
      <input id="phone" placeholder="Phone"/>
      <input id="address" placeholder="Address"/>
      <input id="salary" placeholder="Salary"/>
      <textarea id="notes" placeholder="Notes"></textarea>
      <button onclick="addEmployee()">Add</button>
    </div>

    <div class="panel">
      <input id="search" placeholder="Search..." oninput="render()"/>
    </div>

    <div class="panel">
      <h3>Employees</h3>
      <div id="employees"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_ORT_1nKU_wt7ONnspTl7yLxvA-YqN_k",
  authDomain: "group-chat-xand.firebaseapp.com",
  projectId: "group-chat-xand",
  storageBucket: "group-chat-xand.firebasestorage.app",
  messagingSenderId: "316883609389",
  appId: "1:316883609389:web:3126c72e78135ee8b5d5a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_UID = "REPLACE_WITH_YOUR_UID";

let employees = [];
let listenerActive = false;

/* ---------------- UI HELPERS ---------------- */

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

function showError(msg){
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.innerText = "ERROR: " + msg;
}

/* ---------------- GLOBAL ERROR CATCH ---------------- */

window.onerror = function(msg){
  showError(msg);
};

window.addEventListener("unhandledrejection", (e)=>{
  showError(e.reason?.message || e.reason);
});

/* ---------------- AUTH ---------------- */

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    showError(e.message);
  }
};

document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).catch(e => showError(e.message));
};

/* ---------------- FIREBASE STATE ---------------- */

onAuthStateChanged(auth, (user) => {
  try {
    if (user && user.uid === ADMIN_UID) {
      loginBox.classList.add("hidden");
      app.classList.remove("hidden");
      toast("Logged in");

      if (!listenerActive) {
        listenEmployees();
        listenerActive = true;
      }
    } else {
      loginBox.classList.remove("hidden");
      app.classList.add("hidden");
    }
  } catch (e) {
    showError(e.message);
  }
});

/* ---------------- FIRESTORE ---------------- */

function listenEmployees(){
  try {
    onSnapshot(query(collection(db,"employees")), snap=>{
      employees = snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
    }, err => showError(err.message));
  } catch (e) {
    showError(e.message);
  }
}

/* ---------------- ACTIONS ---------------- */

window.addEmployee = async () => {
  try {
    await addDoc(collection(db,"employees"),{
      name:name.value,
      email:empEmail.value,
      phone:phone.value,
      address:address.value,
      salary:Number(salary.value || 0),
      notes:notes.value,
      warnings:0,
      status:"active",
      createdAt:serverTimestamp()
    });

    toast("Employee added");
  } catch (e) {
    showError(e.message);
  }
};

window.fire = async (id) => {
  try {
    await updateDoc(doc(db,"employees",id),{
      status:"fired"
    });
    toast("Employee fired");
  } catch (e) {
    showError(e.message);
  }
};

/* ---------------- RENDER ---------------- */

window.render = () => {
  try {
    const s = search.value?.toLowerCase() || "";
    employeesDiv.innerHTML = "";

    employees
      .filter(e =>
        e.name?.toLowerCase().includes(s) ||
        e.email?.toLowerCase().includes(s)
      )
      .forEach(e=>{
        employeesDiv.innerHTML += `
          <div class="panel">
            <b>${e.name}</b> (${e.status})<br/>
            ${e.email}<br/>
            £${e.salary}<br/><br/>
            <button class="danger" onclick="fire('${e.id}')">Fire</button>
          </div>
        `;
      });

  } catch (e) {
    showError(e.message);
  }
};
</script>

</body>
</html>
