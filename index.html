<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xander EMS v2.1</title>

<style>
:root {
  --bg:#0b1220;
  --panel:#111a2e;
  --accent:#3b82f6;
  --danger:#ef4444;
  --text:#e5e7eb;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:var(--panel);
}

.container {
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.panel {
  background:var(--panel);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.grid {
  display:grid;
  gap:10px;
}

@media(min-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

input,textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

button {
  padding:10px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

button.danger {background:var(--danger);}
.hidden {display:none;}
.row {display:flex; gap:10px; flex-wrap:wrap;}
.small {font-size:12px; opacity:0.8;}
</style>
</head>

<body>

<header>
  <b>Xander EMS v2.1</b>
  <button id="authBtn">Login</button>
</header>

<div class="container">

  <!-- LOGIN UI -->
  <div id="loginUI" class="panel">
    <h2>Admin Login</h2>
    <input id="loginEmail" placeholder="Email"/>
    <input id="loginPassword" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <div class="panel">
      <h3>Create Employee</h3>

      <div class="grid">
        <input id="name" placeholder="Name"/>
        <input id="email" placeholder="Email"/>
        <input id="phone" placeholder="Phone"/>
        <input id="address" placeholder="Address"/>
        <input id="salary" placeholder="Salary"/>
      </div>

      <textarea id="notes" placeholder="Notes / warnings"></textarea>

      <button onclick="addEmployee()">Add Employee</button>
    </div>

    <div class="panel">
      <input id="search" placeholder="Search..." oninput="render()"/>
    </div>

    <div class="panel">
      <h3>Employees</h3>
      <div id="employees"></div>
    </div>

    <div class="panel">
      <h3>Audit Logs</h3>
      <div id="logs"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_ORT_1nKU_wt7ONnspTl7yLxvA-YqN_k",
  authDomain: "group-chat-xand.firebaseapp.com",
  projectId: "group-chat-xand",
  storageBucket: "group-chat-xand.firebasestorage.app",
  messagingSenderId: "316883609389",
  appId: "1:316883609389:web:3126c72e78135ee8b5d5a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminUID = "REPLACE_WITH_YOUR_UID";

let employees = [];
let inactivityTimer;

const loginUI = document.getElementById("loginUI");
const dashboard = document.getElementById("dashboard");
const authBtn = document.getElementById("authBtn");

authBtn.onclick = async () => {
  if (auth.currentUser) {
    await signOut(auth);
  }
};

window.login = async function () {
  try {
    await signInWithEmailAndPassword(
      auth,
      loginEmail.value,
      loginPassword.value
    );
  } catch (e) {
    alert("Login failed");
  }
};

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user && user.uid === adminUID) {
    loginUI.classList.add("hidden");
    dashboard.classList.remove("hidden");
    authBtn.innerText = "Logout";

    startListeners();
    resetInactivity();
  } else {
    loginUI.classList.remove("hidden");
    dashboard.classList.add("hidden");
    authBtn.innerText = "Login";
  }
});

// INACTIVITY LOGOUT (10 min)
function resetInactivity() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => {
    signOut(auth);
    alert("Logged out due to inactivity");
  }, 600000);
}

document.addEventListener("mousemove", resetInactivity);
document.addEventListener("keydown", resetInactivity);

// FIRESTORE LOGGING
function log(action, details) {
  addDoc(collection(db,"employee_history"), {
    action,
    details,
    by: auth.currentUser.email,
    timestamp: serverTimestamp()
  });
}

// EMPLOYEES
window.addEmployee = async function () {
  await addDoc(collection(db,"employees"), {
    name:name.value,
    email:email.value,
    phone:phone.value,
    address:address.value,
    salary:Number(salary.value),
    notes:notes.value,
    warningsCount:0,
    status:"active",
    createdAt:serverTimestamp()
  });

  log("create", name.value);
};

// WARN / FIRE / EDIT
window.warnEmployee = async function(id, w) {
  await updateDoc(doc(db,"employees",id), {
    warningsCount: w + 1
  });
  log("warn", id);
};

window.fireEmployee = async function(id) {
  await updateDoc(doc(db,"employees",id), {
    status:"fired"
  });
  log("fire", id);
};

window.editSalary = async function(id) {
  const val = prompt("New salary:");
  if(!val) return;

  await updateDoc(doc(db,"employees",id), {
    salary:Number(val)
  });

  log("salary", id);
};

// LISTENERS
function startListeners() {

  onSnapshot(query(collection(db,"employees")), (snap) => {
    employees = snap.docs.map(d => ({id:d.id,...d.data()}));
    render();
  });

  onSnapshot(query(collection(db,"employee_history"), orderBy("timestamp","desc")), (snap) => {
    logs.innerHTML = "";
    snap.forEach(d => {
      const x = d.data();
      logs.innerHTML += `
        <div class="panel small">
          ${x.action} — ${x.details} — ${x.by || "system"}
        </div>
      `;
    });
  });
}

// RENDER UI
window.render = function () {
  const s = search.value?.toLowerCase() || "";
  employeesDiv.innerHTML = "";

  employees
    .filter(e =>
      e.name.toLowerCase().includes(s) ||
      e.email.toLowerCase().includes(s)
    )
    .forEach(e => {

      employeesDiv.innerHTML += `
        <div class="panel">
          <b>${e.name}</b> (${e.status})<br/>
          ${e.email}<br/>
          ${e.phone}<br/>
          £${e.salary}<br/>
          Warnings: ${e.warningsCount}<br/><br/>

          <div class="row">
            <button onclick="warnEmployee('${e.id}',${e.warningsCount})">Warn</button>
            <button onclick="editSalary('${e.id}')">Salary</button>
            <button class="danger" onclick="fireEmployee('${e.id}')">Fire</button>
          </div>
        </div>
      `;
    });
};
</script>

</body>
</html>
